<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Instagram</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  </head>
  <body>

    <!-- Navbar -->
    <nav class="navbar bg-white border-bottom px-3">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-instagram fs-4"></i>
        <span class="fw-bold fs-5">Instagram</span>
      </div>
      <div class="d-flex gap-2">

        <!-- Botão Create a new post -->
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#newPostModal">
          Create a new post
        </button>

        <!-- Dropdown Settings -->
        <div class="dropdown">
          <button class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown">
            <i class="bi bi-gear-fill"></i>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="#">Profile</a></li>
            <li><a class="dropdown-item" href="#">Accesibility</a></li>
            <li><a class="dropdown-item" href="#">Privacy and Data</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="#">Log out</a></li>
          </ul>
        </div>

      </div>
    </nav>

    <!-- Modal Create a new post -->
    <div class="modal fade" id="newPostModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title fw-bold">Create a new post</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <label class="fw-bold mb-2">Caption:</label>
            <textarea class="form-control mb-3" rows="4" placeholder="Add the caption of your post here"></textarea>
            <div class="d-flex gap-2">
              <button class="btn btn-outline-secondary"><i class="bi bi-camera-fill"></i></button>
              <button class="btn btn-outline-secondary"><i class="bi bi-geo-alt-fill"></i></button>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="button" class="btn btn-success">Publish</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Botões de view -->
    <div class="d-flex justify-content-center gap-3 my-3">
      <i id="btn-grid" class="bi bi-grid-3x3-gap-fill fs-4 text-secondary" role="button"></i>
      <i id="btn-feed" class="bi bi-square-fill fs-4 text-primary" role="button"></i>
    </div>

    <!-- Grid view -->
    <div id="grid-view" class="container-fluid px-0 d-none">
      <div class="row row-cols-3 g-1">
        <div class="col"><div class="ratio ratio-1x1"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRm54FlG-LkZnL3TGAwGHveR7FLmFltkwZJA_x0oPRKZwqYgLrZMiU9EdWpy2BFoiceHGfvJLUCobFF5x9RQiJFypZuBV_a2PO_WM8zaBc&s=10" class="object-fit-cover w-100" /></div></div>
        <div class="col"><div class="ratio ratio-1x1"><img src="https://people.com/thmb/HloRwBpimJEvI4iFvGj3TgB3THE=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc():focal(749x0:751x2)/cillian-murphy-tom-hanks-sidney-potnier-best-actor-winners-021825-bb4bbffee5a24937931faa67c5d72973.jpg" class="object-fit-cover w-100" /></div></div>
        <div class="col"><div class="ratio ratio-1x1"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRofqhL4KMQcfZrOD-NDfDTlvtTWmu8864mKA&s" class="object-fit-cover w-100" /></div></div>
        <div class="col"><div class="ratio ratio-1x1"><img src="https://penntoday.upenn.edu/sites/default/files/styles/2880px_wide_with_focal_crop/public/2026-03/iran-war-teaser_1.jpg?h=56d0ca2e&itok=nCS58TzB" class="object-fit-cover w-100" /></div></div>
        <div class="col"><div class="ratio ratio-1x1"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRm54FlG-LkZnL3TGAwGHveR7FLmFltkwZJA_x0oPRKZwqYgLrZMiU9EdWpy2BFoiceHGfvJLUCobFF5x9RQiJFypZuBV_a2PO_WM8zaBc&s=10" class="object-fit-cover w-100" /></div></div>
        <div class="col"><div class="ratio ratio-1x1"><img src="https://people.com/thmb/HloRwBpimJEvI4iFvGj3TgB3THE=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc():focal(749x0:751x2)/cillian-murphy-tom-hanks-sidney-potnier-best-actor-winners-021825-bb4bbffee5a24937931faa67c5d72973.jpg" class="object-fit-cover w-100" /></div></div>
        <div class="col"><div class="ratio ratio-1x1"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRofqhL4KMQcfZrOD-NDfDTlvtTWmu8864mKA&s" class="object-fit-cover w-100" /></div></div>
        <div class="col"><div class="ratio ratio-1x1"><img src="https://penntoday.upenn.edu/sites/default/files/styles/2880px_wide_with_focal_crop/public/2026-03/iran-war-teaser_1.jpg?h=56d0ca2e&itok=nCS58TzB" class="object-fit-cover w-100" /></div></div>
        <div class="col"><div class="ratio ratio-1x1"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRm54FlG-LkZnL3TGAwGHveR7FLmFltkwZJA_x0oPRKZwqYgLrZMiU9EdWpy2BFoiceHGfvJLUCobFF5x9RQiJFypZuBV_a2PO_WM8zaBc&s=10" class="object-fit-cover w-100" /></div></div>
      </div>
    </div>

    <!-- Feed view -->
    <div id="feed-view" class="container w-50 mx-auto">

      <div class="card mb-4">
        <div class="card-header d-flex justify-content-between bg-white">
          <span class="fw-bold">My Crazy dog Spark!</span>
          <span class="text-muted">08/26</span>
        </div>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRm54FlG-LkZnL3TGAwGHveR7FLmFltkwZJA_x0oPRKZwqYgLrZMiU9EdWpy2BFoiceHGfvJLUCobFF5x9RQiJFypZuBV_a2PO_WM8zaBc&s=10" class="w-100" />
        <div class="card-body">
          <p class="fw-bold mb-1">204 Likes</p>
          <p>This is an example of a very good photo that you can post on instagram</p>
        </div>
      </div>

      <div class="card mb-4">
        <div class="card-header d-flex justify-content-between bg-white">
          <span class="fw-bold">Oscar Winners</span>
          <span class="text-muted">09/10</span>
        </div>
        <img src="https://people.com/thmb/HloRwBpimJEvI4iFvGj3TgB3THE=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc():focal(749x0:751x2)/cillian-murphy-tom-hanks-sidney-potnier-best-actor-winners-021825-bb4bbffee5a24937931faa67c5d72973.jpg" class="w-100" />
        <div class="card-body">
          <p class="fw-bold mb-1">98 Likes</p>
          <p>Amazing night at the Oscars!</p>
        </div>
      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script>
      const btnGrid = document.getElementById("btn-grid");
      const btnFeed = document.getElementById("btn-feed");
      const gridView = document.getElementById("grid-view");
      const feedView = document.getElementById("feed-view");

      btnGrid.addEventListener("click", function() {
        gridView.classList.remove("d-none");
        feedView.classList.add("d-none");
        btnGrid.classList.replace("text-secondary", "text-primary");
        btnFeed.classList.replace("text-primary", "text-secondary");
      });

      btnFeed.addEventListener("click", function() {
        feedView.classList.remove("d-none");
        gridView.classList.add("d-none");
        btnFeed.classList.replace("text-secondary", "text-primary");
        btnGrid.classList.replace("text-primary", "text-secondary");
      });
    </script>

  </body>
</html>
